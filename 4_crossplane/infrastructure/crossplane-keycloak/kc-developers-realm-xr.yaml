apiVersion: keycloak.crossplane.io/v1alpha1
kind: XBuiltinObjects
metadata:
  name: keycloak-builtin-objects-developers-realm
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  providerConfigName: keycloak-config
  providerSecretName: keycloak-credentials
  realm: developers-realm
  builtinClients:
    - realm-management
  builtinRealmRoles:
    - admin
  builtinAuthenticationFlows:
    - browser

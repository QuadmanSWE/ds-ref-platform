apiVersion: user.keycloak.crossplane.io/v1alpha1
kind: User
metadata:
  name: developers-admin
spec:
  forProvider:
    realmIdRef: 
      name: developers-realm
    initialPassword:
      - valueSecretRef:
          name: crossplane-keycloak-secret
          key: admin-password
          namespace: crossplane-system
    emailVerified: true
  providerConfigRef:
    name: keycloak-config